<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Data Science</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<button id="theme-toggle">🌙</button>
  
<header class="hero">
  <h1>Data Science</h1>
  <p class="subtitle">Σκέψεις, Projects και Πειραματισμοί</p>
</header>

<main class="blog-container">

  <article class="post-preview">
    <h2><a href="post1.html">🚀 Το τρέχον project μου</a></h2>
    <p class="post-meta">Μάιος 2026</p>
    <p>
      Μια εισαγωγή στο project που δουλεύω αυτή τη στιγμή και τα βασικά ερωτήματα που προσπαθώ να απαντήσω...
    </p>
  </article>

  <!-- Add more posts here -->

</main>

<main class="blog-container" id="blog"></main>

<script src="posts.js"></script>
<script>
  const container = document.getElementById("blog");

  posts.forEach(post => {
    const el = document.createElement("article");
    el.className = "post-preview";

    el.innerHTML = `
      <h2><a href="${post.link}">${post.title}</a></h2>
      <p class="post-meta">${post.date}</p>
      <p>${post.description}</p>
    `;

    container.appendChild(el);
  });
</script>
  
</body>
</html>
